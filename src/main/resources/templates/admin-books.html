<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Books - Horizon Library Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script>
        if(!localStorage.getItem('admin_user')) window.location.href = '/index.html';
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                document.body.classList.add('dark-theme');
            }
        })();
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggleBtn = document.getElementById('theme-toggle');
            const themeIcon = themeToggleBtn.querySelector('i');
            
            if (document.body.classList.contains('dark-theme')) {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }

            themeToggleBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-theme');
                if (document.body.classList.contains('dark-theme')) {
                    localStorage.setItem('theme', 'dark');
                    themeIcon.classList.remove('fa-sun');
                    themeIcon.classList.add('fa-moon');
                } else {
                    localStorage.setItem('theme', 'light');
                    themeIcon.classList.remove('fa-moon');
                    themeIcon.classList.add('fa-sun');
                }
            });
        });
    </script>
    <div class="top-navbar" style="background:var(--secondary); border-bottom:1px solid rgba(255,255,255,0.1);">
        <div class="brand" style="display:flex; align-items:center; gap:10px;">
            <div style="background:var(--primary); padding:8px; border-radius:10px; display:flex;">📖</div>
            Horizon Admin - Books
        </div>
        <div style="display:flex; align-items:center; gap:15px;">
            <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
                <i class="fa-solid fa-sun"></i>
            </button>
            <button onclick="goBack()" style="background:rgba(255,255,255,0.1); color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:600;">← Back</button>
            <button onclick="logout()" style="background:rgba(239,68,68,0.1); color:#ef4444; border:1px solid rgba(239,68,68,0.2); padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:600;">Logout</button>
        </div>
    </div>

    <div class="container-main">
        <div class="dashboard-content" style="width:100%;">
            <div style="background:white; padding:2rem; border-radius:var(--radius-md); border:1px solid var(--border); margin-bottom:2rem;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                    <h2 style="font-size:1.6rem; font-weight:900; color:var(--secondary); margin:0;">📚 Manage Books</h2>
                    <button onclick="openAddBookForm()" class="btn" style="padding:12px 25px; display:flex; align-items:center; gap:8px;">➕ Add New Book</button>
                </div>

                <!-- Add Book Form -->
                <div id="addBookForm" style="display:none; background:#f8f9fa; padding:1.5rem; border-radius:10px; margin-bottom:2rem; border:1px solid var(--border);">
                    <h3 style="color:var(--secondary); margin-top:0;">Add New Book to Catalog</h3>
                    <form onsubmit="submitAddBook(event)">
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem;">
                            <div>
                                <label style="font-weight:600; display:block; margin-bottom:8px;">Book Title *</label>
                                <input type="text" id="bookTitle" placeholder="Enter book title" required style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);">
                            </div>
                            <div>
                                <label style="font-weight:600; display:block; margin-bottom:8px;">Author Name *</label>
                                <input type="text" id="bookAuthor" placeholder="Enter author name" required style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);">
                            </div>
                            <div>
                                <label style="font-weight:600; display:block; margin-bottom:8px;">Category *</label>
                                <input type="text" id="bookCategory" placeholder="e.g., Fiction, Science, Classic" required style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);">
                            </div>
                            <div>
                                <label style="font-weight:600; display:block; margin-bottom:8px;">Publication Year</label>
                                <input type="number" id="bookYear" value="2023" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);">
                            </div>
                            <div>
                                <label style="font-weight:600; display:block; margin-bottom:8px;">Total Copies *</label>
                                <input type="number" id="bookCopies" value="1" min="1" required style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);">
                            </div>
                            <div>
                                <label style="font-weight:600; display:block; margin-bottom:8px;">Description</label>
                                <input type="text" id="bookDesc" placeholder="Book description" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);">
                            </div>
                            <div>
                                <label style="font-weight:600; display:block; margin-bottom:8px;">Book Cover (Image) *</label>
                                <input type="file" id="bookCoverInput" accept="image/*" required style="width:100%; padding:8px; border-radius:8px; border:1px solid var(--border);">
                            </div>
                            <div>
                                <label style="font-weight:600; display:block; margin-bottom:8px;">eBook File (PDF Optional)</label>
                                <input type="file" id="bookPdfInput" accept="application/pdf" style="width:100%; padding:8px; border-radius:8px; border:1px solid var(--border);">
                            </div>
                        </div>
                        <div style="margin-top:1.5rem; display:flex; gap:1rem;">
                            <button type="submit" class="btn" style="flex:1; padding:12px;">✅ Add Book</button>
                            <button type="button" class="btn" style="flex:1; padding:12px; background:#f3f4f6; color:var(--secondary);" onclick="closeAddBookForm()">❌ Cancel</button>
                        </div>
                    </form>
                </div>

                <!-- Books Table -->
                <div style="overflow-x:auto;">
                    <table style="width:100%; border-collapse:collapse;">
                        <thead style="background:#f8f9fa; border-bottom:2px solid var(--border);">
                            <tr>
                                <th style="padding:12px; text-align:left; font-weight:700; color:var(--secondary);">Book Title</th>
                                <th style="padding:12px; text-align:left; font-weight:700; color:var(--secondary);">Author</th>
                                <th style="padding:12px; text-align:left; font-weight:700; color:var(--secondary);">Category</th>
                                <th style="padding:12px; text-align:center; font-weight:700; color:var(--secondary);">Stock</th>
                                <th style="padding:12px; text-align:center; font-weight:700; color:var(--secondary);">Available</th>
                                <th style="padding:12px; text-align:center; font-weight:700; color:var(--secondary);">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="booksTableBody">
                            <!-- Books loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="message" style="display:none; padding:1rem; border-radius:10px; font-weight:600; margin-bottom:2rem;"></div>
        </div>
    </div>

    <script>
        function logout() { localStorage.clear(); window.location.href = '/'; }
        function goBack() {
            window.location.href = '/admin.html';
        }

        async function loadBooks() {
            try {
                const response = await fetch('/api/books');
                if (response.ok) {
                    const books = await response.json();
                    displayBooksTable(books);
                }
            } catch (error) {
                showMessage('Error loading books: ' + error.message, 'error');
            }
        }

        function displayBooksTable(books) {
            const tbody = document.getElementById('booksTableBody');
            tbody.innerHTML = '';

            books.forEach(book => {
                const row = document.createElement('tr');
                row.style.cssText = 'border-bottom:1px solid var(--border);';
                row.innerHTML = `
                    <td style="padding:12px; color:var(--secondary); font-weight:600;">${book.title}</td>
                    <td style="padding:12px; color:var(--text-muted);">${book.author}</td>
                    <td style="padding:12px; color:var(--text-muted);">${book.category}</td>
                    <td style="padding:12px; text-align:center; color:var(--secondary); font-weight:700;">${book.totalCopies}</td>
                    <td style="padding:12px; text-align:center; color:${book.availableCopies > 0 ? '#10b981' : '#ef4444'}; font-weight:700;">${book.availableCopies}</td>
                    <td style="padding:12px; text-align:center;">
                        <button onclick="editBook(${book.id})" style="background:var(--primary-light); color:var(--primary); border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:600; margin-right:5px;">✏️ Edit</button>
                        <button onclick="deleteBook(${book.id})" style="background:#fee2e2; color:#dc2626; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:600;">🗑️ Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function openAddBookForm() {
            document.getElementById('addBookForm').style.display = 'block';
        }

        function closeAddBookForm() {
            document.getElementById('addBookForm').style.display = 'none';
            document.getElementById('bookTitle').value = '';
            document.getElementById('bookAuthor').value = '';
            document.getElementById('bookCategory').value = '';
            document.getElementById('bookYear').value = '2023';
            document.getElementById('bookCopies').value = '1';
            document.getElementById('bookDesc').value = '';
        }

        async function submitAddBook(e) {
            e.preventDefault();

            try {
                const coverFile = document.getElementById('bookCoverInput').files[0];
                const pdfFile = document.getElementById('bookPdfInput').files[0];

                let coverBase64 = "";
                let coverName = "";
                if (coverFile) {
                    coverName = coverFile.name;
                    coverBase64 = await toBase64(coverFile);
                }

                let pdfBase64 = "";
                let pdfName = "";
                if (pdfFile) {
                    pdfName = pdfFile.name;
                    pdfBase64 = await toBase64(pdfFile);
                }

                const response = await fetch('/api/books', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        title: document.getElementById('bookTitle').value,
                        author: document.getElementById('bookAuthor').value,
                        category: document.getElementById('bookCategory').value,
                        publication_year: document.getElementById('bookYear').value,
                        total_copies: document.getElementById('bookCopies').value,
                        description: document.getElementById('bookDesc').value,
                        cover_name: coverName,
                        cover_base64: coverBase64,
                        pdf_name: pdfName,
                        pdf_base64: pdfBase64
                    })
                });

                if (response.ok) {
                    showMessage('✅ Book added successfully!', 'success');
                    closeAddBookForm();
                    setTimeout(() => loadBooks(), 1000);
                } else {
                    showMessage('❌ Failed to add book', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        function editBook(bookId) {
            alert('Edit functionality coming soon!');
        }

        async function deleteBook(bookId) {
            if (!confirm('Are you sure you want to delete this book?')) return;
            
            try {
                const response = await fetch(`/api/books/${bookId}`, {
                    method: 'DELETE',
                    headers: {'Content-Type': 'application/json'}
                });

                if (response.ok) {
                    showMessage('✅ Book deleted successfully!', 'success');
                    setTimeout(() => loadBooks(), 1000);
                } else {
                    showMessage('❌ Failed to delete book', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = msg;
            msgDiv.style.display = 'block';
            msgDiv.style.background = type === 'success' ? '#d1fae5' : '#fee2e2';
            msgDiv.style.color = type === 'success' ? '#065f46' : '#7f1d1d';
            
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }

        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // Load books on page load
        document.addEventListener('DOMContentLoaded', loadBooks);
    </script>
</body>
</html>
